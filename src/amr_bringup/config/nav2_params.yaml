# config/nav2_params.yaml
# Tuning cho AMR 2 bánh vi sai (differential drive)
# Kích thước robot: ~30cm × 25cm, wheel_base 20cm

amcl:
  ros__parameters:
    use_sim_time: false

    # Số particles — giảm nếu Pi bị nặng
    min_particles:          500
    max_particles:          2000
    kld_err:                0.05
    kld_z:                  0.99

    # Chuyển động (differential drive)
    alpha1: 0.2             # noise xoay do xoay
    alpha2: 0.2             # noise xoay do tịnh tiến
    alpha3: 0.2             # noise tịnh tiến do tịnh tiến
    alpha4: 0.2             # noise tịnh tiến do xoay
    alpha5: 0.1

    robot_model_type:       "nav2_amcl::DifferentialMotionModel"
    laser_model_type:       likelihood_field

    # Frame
    odom_frame_id:          odom
    base_frame_id:          base_link
    global_frame_id:        map
    scan_topic:             scan

    # LiDAR range (chỉnh theo spec thực tế)
    laser_max_range:        6.0
    laser_min_range:        0.15
    max_beams:              60

    laser_likelihood_max_dist: 2.0
    sigma_hit:              0.2
    z_hit:                  0.5
    z_rand:                 0.5

    # Update
    update_min_d:           0.15   # m
    update_min_a:           0.15   # rad
    resample_interval:      2
    transform_tolerance:    1.0
    recovery_alpha_slow:    0.001
    recovery_alpha_fast:    0.1

    set_initial_pose:       true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

# ──────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame:           map
    robot_base_frame:       base_link
    odom_topic:             /odom
    bt_loop_duration:       10
    default_server_timeout: 20
    navigators:             ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin:               "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin:               "nav2_bt_navigator::NavigateThroughPosesNavigator"

# ──────────────────────────────────────────────────────────
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency:   10.0    # Hz — giảm xuống 5 nếu Pi lag

    # Tolerance khi đến đích
    goal_checker_plugins:   ["general_goal_checker"]
    general_goal_checker:
      plugin:               "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance:    0.15    # m
      yaw_goal_tolerance:   0.15    # rad
      stateful:             true

    progress_checker_plugin: "progress_checker"
    progress_checker:
      plugin:               "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0

    # DWB Local Planner (tốt cho diff drive)
    controller_plugins:     ["FollowPath"]
    FollowPath:
      plugin:               "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false

      # Vận tốc tối đa (chỉnh theo khả năng thực tế của robot)
      min_vel_x:            0.0
      max_vel_x:            0.28     # m/s tối đa tiến
      min_vel_y:            0.0
      max_vel_y:            0.0      # diff drive: không có vận tốc ngang
      max_vel_theta:        1.5      # rad/s tối đa xoay
      min_vel_theta:        0.0
      min_speed_xy:         0.08
      max_speed_xy:         0.28
      min_speed_theta:      0.0
      acc_lim_x:            0.6      # gia tốc tuyến tính
      acc_lim_y:            0.0
      acc_lim_theta:        1.5      # gia tốc góc
      decel_lim_x:         -0.8
      decel_lim_y:          0.0
      decel_lim_theta:     -1.5

      vx_samples:           15
      vy_samples:           1
      vtheta_samples:       20
      sim_time:             1.5
      linear_granularity:   0.05
      angular_granularity:  0.025
      transform_tolerance:  0.2

      xy_goal_tolerance:    0.15
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful:             true

      # Critics
      critics:              ["RotateToGoal", "Oscillation", "BaseObstacle",
                             "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale:   0.02
      PathAlign.scale:      32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale:      24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale:       32.0
      GoalDist.scale:       24.0
      RotateToGoal.scale:   32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# ──────────────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin:               "nav2_navfn_planner::NavfnPlanner"
      tolerance:            0.5
      use_astar:            false    # true = A*, false = Dijkstra
      allow_unknown:        true

# ──────────────────────────────────────────────────────────
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic:          local_costmap/costmap_raw
    footprint_topic:        local_costmap/published_footprint
    cycle_frequency:        10.0
    behavior_plugins:       ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin:               "nav2_behaviors::Spin"
    backup:
      plugin:               "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin:               "nav2_behaviors::DriveOnHeading"
    wait:
      plugin:               "nav2_behaviors::Wait"
    local_frame:            odom
    global_frame:           map
    robot_base_frame:       base_link
    transform_tolerance:    0.1
    simulate_ahead_time:    2.0
    max_rotational_vel:     1.0
    min_rotational_vel:     0.1
    rotational_acc_lim:     1.5

# ──────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time:         false
      update_frequency:     5.0
      publish_frequency:    2.0
      global_frame:         odom
      robot_base_frame:     base_link
      rolling_window:       true
      width:                3
      height:               3
      resolution:           0.05

      # Robot footprint (hình chữ nhật 30×25cm)
      footprint:            "[[0.15, 0.125], [0.15, -0.125], [-0.15, -0.125], [-0.15, 0.125]]"
      footprint_padding:    0.02

      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin:             "nav2_costmap_2d::ObstacleLayer"
        enabled:            true
        observation_sources: scan
        scan:
          topic:            /scan
          max_obstacle_height: 2.0
          clearing:         true
          marking:          true
          data_type:        "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin:             "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius:   0.30    # m — giảm nếu robot bị kẹt nhiều

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time:         false
      update_frequency:     1.0
      publish_frequency:    1.0
      global_frame:         map
      robot_base_frame:     base_link
      resolution:           0.05

      footprint:            "[[0.15, 0.125], [0.15, -0.125], [-0.15, -0.125], [-0.15, 0.125]]"
      footprint_padding:    0.02

      track_unknown_space:  true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin:             "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin:             "nav2_costmap_2d::ObstacleLayer"
        enabled:            true
        observation_sources: scan
        scan:
          topic:            /scan
          max_obstacle_height: 2.0
          clearing:         true
          marking:          true
          data_type:        "LaserScan"
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      inflation_layer:
        plugin:             "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius:   0.35

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""       # Set từ launch file

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
